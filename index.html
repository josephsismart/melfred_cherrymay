<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fred &amp; Chem — Forever Begins Here | Sept 5, 2026</title>
  <meta property="og:title" content="💍 Fred &amp; Chem — Forever Begins Here"/>
  <meta property="og:description" content="You're invited! Join us as Fred and Chem say 'I Do' on September 5, 2026 in Butuan City, Philippines. Click to open your digital invitation 💌"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mc-wedding-2026.vercel.app/"/>
  <meta property="og:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:type" content="image/jpeg"/>
  <meta property="og:site_name" content="Fred &amp; Chem Wedding"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #4a7a5a; --green-light: #6aaa7a; --blush: #c8e6d0;
      --gold: #d4a84b; --dark: #051a0a; --dark-mid: #0d3322;
    }
    html, body { min-height: 100%; overflow-x: hidden; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(160deg, #051a0a 0%, #0d3322 45%, #162e1f 75%, #051a0a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; position: relative; padding: 2rem 1rem;
      overflow: hidden;
    }

    #hearts-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .corner-svg { position: fixed; pointer-events: none; opacity: 0.18; }
    .corner-svg.tl { top: 0; left: 0; }
    .corner-svg.br { bottom: 0; right: 0; transform: rotate(180deg); }
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.7);
      animation: twinkle var(--dur,3s) var(--delay,0s) infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:0.1;transform:scale(0.8)} 100%{opacity:0.9;transform:scale(1.2)} }

    /* ── ENVELOPE ── */
    .home-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      animation: fadeIn 1.2s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .env-btn {
      display: inline-flex; flex-direction: column; align-items: center; gap: 0.9rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      animation: fadeIn 1s 0.4s both;
    }
    .env-scene {
      position: relative;
      width: clamp(260px, 70vw, 320px);
      perspective: 900px;
    }
    .env-body {
      width: 100%; aspect-ratio: 1.55/1;
      border-radius: 6px 6px 14px 14px; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.25);
      overflow: hidden;
      background: linear-gradient(150deg,#dff2e6,#c2e0cc);
    }
    .env-v { position:absolute;inset:0;background:linear-gradient(160deg,#aacfb8,#8fc0a0);clip-path:polygon(0 100%,50% 54%,100% 100%);border-radius:0 0 14px 14px; }
    .env-l { position:absolute;inset:0;background:linear-gradient(145deg,#c8e8d2,#aacfb8);clip-path:polygon(0 0,0 100%,50% 54%); }
    .env-r { position:absolute;inset:0;background:linear-gradient(145deg,#c0e2ca,#a2c8b0);clip-path:polygon(100% 0,100% 100%,50% 54%); }

    /* The letter that peeks out — purely decorative */
    .env-peek {
      position:absolute; bottom:0; left:12%; right:12%; height:65%;
      background:linear-gradient(170deg,#fff,#f2fbf5);
      border-radius:4px 4px 0 0;
      box-shadow:0 -4px 16px rgba(0,0,0,0.1);
      opacity:0; transform:translateY(100%);
      transition: transform 0.7s 0.2s cubic-bezier(0.34,1.3,0.64,1), opacity 0.2s 0.25s;
      z-index:6;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:10px;
      overflow:hidden;
    }
    .env-peek::before { content:'F & C'; font-family:'Great Vibes',cursive; font-size:1.4rem; color:rgba(74,122,90,0.4); }
    .env-peek-line { height:2px; background:rgba(74,122,90,0.15); border-radius:2px; width:80%; }
    .env-peek-line:nth-child(3){width:60%;}
    .env-peek-line:nth-child(4){width:72%;}

    .env-seal {
      position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
      width:48px; height:48px; border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#4a7a5a,#0d3322);
      box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 0 3px rgba(200,230,208,0.2);
      display:flex; align-items:center; justify-content:center; z-index:20;
      transition:transform 0.4s, opacity 0.4s;
    }
    .env-seal svg { width:34px; height:34px; }
    .env-flap {
      position:absolute; top:0; left:0; right:0; height:54%;
      transform-origin:top center;
      transition:transform 0.65s cubic-bezier(0.4,0,0.2,1); z-index:15;
    }
    .env-flap-inner { position:absolute;inset:0;background:linear-gradient(160deg,#d0ecda,#b4d4c0);clip-path:polygon(0 0,100% 0,50% 88%);border-radius:6px 6px 0 0; }
    .env-flap-inner::after { content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,0.25),transparent 60%);clip-path:polygon(0 0,100% 0,50% 88%); }

    .env-sparkle { position:absolute;font-size:1rem;pointer-events:none;opacity:0;animation:sparkleFloat 3s ease-in-out infinite; }
    @keyframes sparkleFloat { 0%{opacity:0;transform:translateY(0) scale(0.5)} 30%{opacity:0.8} 100%{opacity:0;transform:translateY(-40px) scale(1.2)} }

    .env-label {
      font-family:'Poppins',sans-serif; font-weight:500;
      font-size:clamp(0.68rem,2.2vw,0.82rem); letter-spacing:0.2em; text-transform:uppercase;
      color:rgba(200,230,208,0.7); transition:opacity 0.4s; margin-top:0.6rem;
    }
    @keyframes envGlow {
      0%,100%{filter:drop-shadow(0 10px 28px rgba(74,122,90,0.35))}
      50%{filter:drop-shadow(0 16px 44px rgba(106,170,122,0.65))}
    }
    .env-scene { animation:envGlow 2.6s 2s infinite; }

    /* OPENED: flap folds back, peek letter rises */
    .env-btn.opened .env-flap { transform:rotateX(-175deg); z-index:4; }
    .env-btn.opened .env-peek { transform:translateY(-30%); opacity:1; }
    .env-btn.opened .env-seal { transform:translateX(-50%) scale(0.8); opacity:0; }
    .env-btn.opened .env-label { opacity:0; }

    /* ── BOTTOM SHEET CARD ── */
    #invite-sheet {
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none;
    }

    /* Dark scrim */
    #invite-sheet .scrim {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0); /* fades in */
      transition: background 0.4s;
    }
    #invite-sheet.show .scrim {
      background: rgba(0,0,0,0.5);
    }

    /* The card panel */
    #invite-sheet .sheet-card {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(175deg, #0d2e1a 0%, #162e1f 100%);
      border-radius: 24px 24px 0 0;
      padding: 12px 24px 40px;
      transform: translateY(100%);
      transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
      text-align: center;
    }
    #invite-sheet.show .sheet-card {
      transform: translateY(0);
    }
    #invite-sheet.show {
      pointer-events: all;
    }

    /* Drag handle */
    .sheet-handle {
      width: 40px; height: 4px;
      background: rgba(200,230,208,0.25); border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* Photo circle */
    .sheet-photo {
      width: 110px; height: 110px; border-radius: 50%;
      margin: 0 auto 16px;
      border: 3px solid rgba(200,230,208,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      overflow: hidden;
      background: linear-gradient(135deg, #1e5238, #0d3322);
      display: flex; align-items: center; justify-content: center;
    }
    .sheet-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sheet-photo-placeholder {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem; color: rgba(200,230,208,0.6);
    }

    .sheet-tag {
      font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }

    .sheet-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.4rem, 8vw, 3rem);
      color: #c8e6d0; line-height: 1; margin-bottom: 10px;
    }
    .sheet-amp { color: var(--gold); }

    .sheet-divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,75,0.6), transparent);
      margin: 0 auto 10px;
    }

    .sheet-date {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem; letter-spacing: 0.12em;
      color: rgba(200,230,208,0.8); margin-bottom: 4px;
    }
    .sheet-location {
      font-size: 0.72rem; letter-spacing: 0.08em;
      color: rgba(200,230,208,0.45); margin-bottom: 28px;
    }

    .sheet-cta {
      display: block; width: 100%;
      background: linear-gradient(135deg, #4a7a5a, #2a5a3a);
      color: #c8e6d0; border: none; border-radius: 50px;
      padding: 1rem 2rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 24px rgba(74,122,90,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .sheet-cta:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(74,122,90,0.3); }

    .sheet-close {
      position: absolute; top: 16px; right: 18px;
      background: rgba(200,230,208,0.1); border: none;
      color: rgba(200,230,208,0.5); font-size: 1.1rem;
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .sheet-close:hover { background: rgba(200,230,208,0.2); color: rgba(200,230,208,0.9); }

    @keyframes burstHeart { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0} }
    @media(max-width:600px) { .corner-svg { width:140px; } }
  </style>
</head>
<body>
<canvas id="hearts-canvas"></canvas>

<svg class="corner-svg tl" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="30" cy="30" r="28" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="80" cy="15" r="18" fill="#4a7a5a" opacity="0.4"/>
  <circle cx="15" cy="80" r="18" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="30" cy="30" rx="12" ry="20" fill="#c8e6d0" opacity="0.6" transform="rotate(-30 30 30)"/>
  <ellipse cx="80" cy="15" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(20 80 15)"/>
  <ellipse cx="15" cy="80" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(-60 15 80)"/>
</svg>
<svg class="corner-svg br" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="30" cy="30" r="28" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="80" cy="15" r="18" fill="#4a7a5a" opacity="0.4"/>
  <circle cx="15" cy="80" r="18" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="30" cy="30" rx="12" ry="20" fill="#c8e6d0" opacity="0.6" transform="rotate(-30 30 30)"/>
  <ellipse cx="80" cy="15" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(20 80 15)"/>
  <ellipse cx="15" cy="80" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(-60 15 80)"/>
</svg>

<div class="stars" id="stars"></div>

<!-- Envelope -->
<div class="home-card">
  <div class="env-btn" id="envBtn">
    <div class="env-scene">
      <span class="env-sparkle" style="left:8%;top:30%;animation-delay:0s">✨</span>
      <span class="env-sparkle" style="right:10%;top:20%;animation-delay:1s">💚</span>
      <span class="env-sparkle" style="left:20%;top:10%;animation-delay:2s">🌿</span>
      <div class="env-body">
        <div class="env-l"></div>
        <div class="env-r"></div>
        <div class="env-v"></div>
        <!-- Decorative peek of letter inside -->
        <div class="env-peek">
          <div class="env-peek-line"></div>
          <div class="env-peek-line"></div>
          <div class="env-peek-line"></div>
        </div>
        <div class="env-flap"><div class="env-flap-inner"></div></div>
      </div>
      <div class="env-seal">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(200,230,208,0.25)" stroke-width="1.5"/>
          <text x="50" y="58" text-anchor="middle" font-family="Great Vibes,Georgia,serif" font-size="34" font-style="italic" fill="rgba(255,255,255,0.9)">FC</text>
        </svg>
      </div>
    </div>
    <span class="env-label">✉ Tap to Open Invitation</span>
  </div>
</div>

<!-- Bottom sheet sneak peek -->
<div id="invite-sheet">
  <div class="scrim" id="scrim"></div>
  <div class="sheet-card">
    <button class="sheet-close" id="sheetClose">✕</button>
    <div class="sheet-handle"></div>
    <p class="sheet-tag">✦ You're Invited ✦</p>
    <div class="sheet-photo">
      <!-- Replace src with real photo URL -->
      <div class="sheet-photo-placeholder">F&C</div>
    </div>
    <div class="sheet-names">Fred <span class="sheet-amp">&</span> Chem</div>
    <div class="sheet-divider"></div>
    <div class="sheet-date">September 5, 2026</div>
    <div class="sheet-location">Butuan City, Philippines</div>
    <button class="sheet-cta" id="viewDetailsBtn">Open Invitation &nbsp;→</button>
  </div>
</div>

<script>
const envBtn       = document.getElementById('envBtn');
const inviteSheet  = document.getElementById('invite-sheet');
const viewDetailsBtn = document.getElementById('viewDetailsBtn');
let envClicked = false;

function closeSheet() {
  // 1. Slide sheet down
  inviteSheet.classList.remove('show');
  // 2. After sheet is gone, close the envelope
  setTimeout(() => {
    envBtn.classList.remove('opened');
    // Allow re-opening after envelope closes
    setTimeout(() => { envClicked = false; }, 700);
  }, 450);
}

// Tap envelope → open flap + show bottom sheet after flap animation
envBtn.addEventListener('click', function() {
  if(envClicked) return;
  envClicked = true;
  this.classList.add('opened');
  setTimeout(() => { inviteSheet.classList.add('show'); }, 700);
});

// Tap "Open Invitation" → go to invitation page
viewDetailsBtn.addEventListener('click', () => {
  window.location.href = '/invitation.html';
});

// Tap scrim → close sheet AND reset envelope
document.getElementById('scrim').addEventListener('click', closeSheet);

document.querySelector('.sheet-handle').addEventListener('click', closeSheet);
document.getElementById('sheetClose').addEventListener('click', closeSheet);

// ── STARS ──
const starsEl = document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=(Math.random()*2+0.8).toFixed(1);
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

// ── FLOATING HEARTS ──
const hc=document.getElementById('hearts-canvas');
const hx=hc.getContext('2d');
let W,H;
function resize(){W=hc.width=window.innerWidth;H=hc.height=window.innerHeight;}
resize(); window.addEventListener('resize',resize);
const COLORS=['#c8e6d0','#6aaa7a','#4a7a5a','#aad8b8','#d0eedd'];
class Heart{
  constructor(init){this.x=Math.random()*W;this.y=init?Math.random()*H:H+20;this.size=Math.random()*10+4;this.speed=Math.random()*0.5+0.15;this.opacity=Math.random()*0.25+0.04;this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=Math.random()*0.02+0.005;this.color=COLORS[Math.floor(Math.random()*COLORS.length)];}
  update(){this.y-=this.speed;this.wobble+=this.wobbleSpeed;this.x+=Math.sin(this.wobble)*0.5;if(this.y<-20){this.y=H+20;this.x=Math.random()*W;}}
  draw(){hx.save();hx.globalAlpha=this.opacity;hx.fillStyle=this.color;hx.translate(this.x,this.y);const s=this.size/10;hx.beginPath();hx.moveTo(0,-2*s);hx.bezierCurveTo(5*s,-7*s,10*s,0,0,8*s);hx.bezierCurveTo(-10*s,0,-5*s,-7*s,0,-2*s);hx.fill();hx.restore();}
}
const hearts=Array.from({length:35},(_,i)=>new Heart(true));
function animateHearts(){hx.clearRect(0,0,W,H);hearts.forEach(h=>{h.update();h.draw();});requestAnimationFrame(animateHearts);}
animateHearts();

// ── DOUBLE TAP BURST ──
let lastTap=0;
document.addEventListener('click',(e)=>{
  const now=Date.now();
  if(now-lastTap<400){for(let i=0;i<12;i++){const h=document.createElement('span');h.textContent=['💚','🌿','✨','💗','🌸'][Math.floor(Math.random()*5)];h.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${1+Math.random()*1.5}rem;pointer-events:none;z-index:9999;animation:burstHeart 0.9s ease forwards;--dx:${(Math.random()-0.5)*120}px;--dy:${-(Math.random()*100+40)}px;`;document.body.appendChild(h);setTimeout(()=>h.remove(),950);}}
  lastTap=now;
});
</script>
</body>
</html>
