<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fred & May — Forever Begins Here | Sept 5, 2026</title>
  <meta property="og:title" content="💍 Fred & May — Forever Begins Here"/>
  <meta property="og:description" content="You're invited! Join us as Fred and May say 'I Do' on September 5, 2026 in Butuan City, Philippines. Click to open your digital invitation 💌"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mc-wedding-2026.vercel.app/"/>
  <meta property="og:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <meta property="og:site_name" content="Fred & May Wedding"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #4a7a5a; --rose-light: #6aaa7a; --blush: #c8e6d0;
      --gold: #d4a84b; --wine: #0d3322; --wine-mid: #1e5238;
    }
    html, body {
      min-height: 100%; overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: linear-gradient(160deg, #051a0a 0%, #0d3322 45%, #162e1f 75%, #051a0a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100dvh; position: relative;
      padding: 2rem 1rem;
    }

    /* Floating hearts canvas */
    #hearts-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* Corner florals */
    .corner-svg { position: fixed; pointer-events: none; opacity: 0.18; }
    .corner-svg.tl { top: 0; left: 0; }
    .corner-svg.br { bottom: 0; right: 0; transform: rotate(180deg); }

    /* Stars */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: twinkle var(--dur, 3s) var(--delay, 0s) infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:0.1;transform:scale(0.8)} 100%{opacity:0.9;transform:scale(1.2)} }

    /* Main card */
    .home-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 0; padding: 2rem 2rem 1.5rem;
      animation: fadeIn 1.2s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* Tag */
    .tag {
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(200,230,208,0.7);
      border: 1px solid rgba(200,230,208,0.2);
      padding: 0.35rem 1.2rem; border-radius: 50px;
      margin-bottom: 1rem;
      animation: fadeIn 1s 0.2s both;
    }

    /* Names */
    .couple-names {
      display: flex; flex-direction: column; align-items: center;
      gap: 0; line-height: 0.88;
      animation: fadeIn 1s 0.5s both;
    }
    .name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(4.5rem, 18vw, 8rem);
      color: #fff;
      text-shadow: 0 0 80px rgba(106,170,122,0.5), 0 4px 40px rgba(0,0,0,0.4);
    }
    .amp {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 7vw, 3.5rem);
      color: var(--rose-light); line-height: 1.1;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      width: min(260px, 60vw); margin: 1rem 0 0.8rem;
      animation: fadeIn 1s 0.8s both;
    }
    .divider::before,.divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,230,208,0.35), transparent);
    }
    .divider i { color: var(--rose-light); font-size: 0.7rem; opacity: 0.8; }

    /* Date + location */
    .date-block {
      display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
      animation: fadeIn 1s 1s both;
    }
    .date-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      color: rgba(200,230,208,0.9); font-weight: 700; letter-spacing: 0.08em;
    }
    .location-text {
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      color: rgba(200,230,208,0.5); letter-spacing: 0.2em; text-transform: uppercase;
    }

    /* Countdown strip */
    .countdown-strip {
      display: flex; align-items: center; gap: 0.6rem;
      margin-top: 1rem;
      animation: fadeIn 1s 1.1s both;
    }
    .cd-unit { display: flex; flex-direction: column; align-items: center; }
    .cd-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 700;
      color: #fff; line-height: 1;
      background: rgba(106,170,122,0.12);
      border: 1px solid rgba(106,170,122,0.25);
      padding: 0.3rem 0.6rem; border-radius: 10px;
      min-width: clamp(44px,8vw,60px); text-align: center;
    }
    .cd-lbl { font-size: 0.45rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(200,230,208,0.5); margin-top:0.2rem; }
    .cd-sep { font-size: 1.2rem; color: rgba(106,170,122,0.5); margin-bottom: 0.6rem; }

    /* ── BIG ENVELOPE ── */
    .env-btn {
      margin-top: 1.8rem;
      display: inline-flex; flex-direction: column; align-items: center; gap: 0.9rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      animation: fadeIn 1s 1.3s both;
    }
    .env-scene {
      position: relative;
      width: clamp(220px, 58vw, 300px);
      perspective: 900px;
    }
    /* Body */
    .env-body {
      width: 100%; aspect-ratio: 1.55/1;
      border-radius: 6px 6px 14px 14px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.25);
      overflow: visible;
      background: linear-gradient(150deg,#dff2e6,#c2e0cc);
    }
    /* Bottom V fold */
    .env-v {
      position: absolute; inset: 0;
      background: linear-gradient(160deg,#aacfb8,#8fc0a0);
      clip-path: polygon(0 100%, 50% 54%, 100% 100%);
      border-radius: 0 0 14px 14px;
    }
    /* Side triangles */
    .env-l { position:absolute;inset:0;background:linear-gradient(145deg,#c8e8d2,#aacfb8);clip-path:polygon(0 0,0 100%,50% 54%); }
    .env-r { position:absolute;inset:0;background:linear-gradient(145deg,#c0e2ca,#a2c8b0);clip-path:polygon(100% 0,100% 100%,50% 54%); }
    /* Wax seal */
    .env-seal {
      position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
      width:48px; height:48px; border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#4a7a5a,#0d3322);
      box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 0 3px rgba(200,230,208,0.2);
      display:flex; align-items:center; justify-content:center;
      z-index:20;
      transition: transform 0.4s, opacity 0.4s;
    }
    .env-seal svg { width:34px; height:34px; }
    /* Flap */
    .env-flap {
      position:absolute; top:0; left:0; right:0; height:54%;
      transform-origin:top center;
      transform-style:preserve-3d;
      transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
      z-index:15;
    }
    .env-flap-inner {
      position:absolute; inset:0;
      background:linear-gradient(160deg,#d0ecda,#b4d4c0);
      clip-path:polygon(0 0,100% 0,50% 88%);
      border-radius:6px 6px 0 0;
    }
    .env-flap-inner::after {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(160deg,rgba(255,255,255,0.25),transparent 60%);
      clip-path:polygon(0 0,100% 0,50% 88%);
    }
    /* Letter */
    .env-letter {
      position:absolute; bottom:12%; left:12%; right:12%;
      height:72%;
      background:linear-gradient(170deg,#fff,#f2fbf5);
      border-radius:4px;
      box-shadow:0 -6px 24px rgba(0,0,0,0.15);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
      padding:0 14px;
      transform:translateY(4px);
      transition:transform 0.55s 0.15s cubic-bezier(0.4,0,0.2,1);
      z-index:6;
      overflow:hidden;
    }
    .env-letter::before {
      content:'F & M';
      font-family:'Great Vibes',cursive; font-size:1.6rem;
      color:rgba(74,122,90,0.35); margin-bottom:4px;
    }
    .env-line { height:2px; width:100%; background:rgba(74,122,90,0.18); border-radius:2px; }
    .env-line:nth-child(3){ width:75%; }
    .env-line:nth-child(4){ width:88%; }
    .env-line:nth-child(5){ width:60%; }

    /* Opened state */
    .env-btn.opened .env-flap { transform:rotateX(-175deg); }
    .env-btn.opened .env-letter { transform:translateY(-72%); }
    .env-btn.opened .env-seal { transform:translateX(-50%) scale(0.8); opacity:0; }

    /* Floating sparkles */
    .env-sparkle {
      position:absolute; font-size:1rem; pointer-events:none; opacity:0;
      animation: sparkleFloat 3s ease-in-out infinite;
    }
    @keyframes sparkleFloat {
      0%{opacity:0;transform:translateY(0) scale(0.5)}
      30%{opacity:0.8}
      100%{opacity:0;transform:translateY(-40px) scale(1.2)}
    }
    /* Label */
    .env-label {
      font-family:'Poppins',sans-serif; font-weight:500;
      font-size:clamp(0.68rem,2.2vw,0.82rem);
      letter-spacing:0.2em; text-transform:uppercase;
      color:rgba(200,230,208,0.7);
      transition:opacity 0.4s;
    }
    .env-btn.opened .env-label { opacity:0; }
    /* Glow pulse */
    @keyframes envGlow {
      0%,100%{filter:drop-shadow(0 10px 28px rgba(74,122,90,0.35))}
      50%{filter:drop-shadow(0 16px 44px rgba(106,170,122,0.65))}
    }
    .env-scene { animation: envGlow 2.6s 2s infinite; }
    @keyframes pulse {
      0%,100%{box-shadow:0 8px 32px rgba(74,122,90,0.45),0 0 0 0 rgba(106,170,122,0.3)}
      50%{box-shadow:0 8px 32px rgba(74,122,90,0.45),0 0 0 12px rgba(106,170,122,0)}
    }

    /* Music button */

    /* Mobile */
    @media(max-width:600px) {
      .home-card { padding: 1.2rem 1.2rem 1rem; }
      .tag { margin-bottom: 0.6rem; }
      .divider { margin: 0.7rem 0 0.5rem; }
      .countdown-strip { gap: 0.4rem; margin-top: 0.7rem; }
      .open-btn { margin-top: 0.9rem; }
      .corner-svg { width: 140px; }
    }
    @media(max-width:380px) {
      .name { font-size: clamp(3.5rem, 17vw, 5rem); }
      .countdown-strip { gap: 0.3rem; }
    }

    @keyframes burstHeart { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0} }
  </style>
</head>
<body>
<canvas id="hearts-canvas"></canvas>

<!-- Corner florals -->
<svg class="corner-svg tl" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="30" cy="30" r="28" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="80" cy="15" r="18" fill="#4a7a5a" opacity="0.4"/>
  <circle cx="15" cy="80" r="18" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="30" cy="30" rx="12" ry="20" fill="#c8e6d0" opacity="0.6" transform="rotate(-30 30 30)"/>
  <ellipse cx="80" cy="15" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(20 80 15)"/>
  <ellipse cx="15" cy="80" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(-60 15 80)"/>
  <circle cx="50" cy="50" r="3" fill="#6aaa7a" opacity="0.6"/>
  <circle cx="90" cy="30" r="2" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="30" cy="90" r="2" fill="#6aaa7a" opacity="0.5"/>
</svg>
<svg class="corner-svg br" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="30" cy="30" r="28" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="80" cy="15" r="18" fill="#4a7a5a" opacity="0.4"/>
  <circle cx="15" cy="80" r="18" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="30" cy="30" rx="12" ry="20" fill="#c8e6d0" opacity="0.6" transform="rotate(-30 30 30)"/>
  <ellipse cx="80" cy="15" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(20 80 15)"/>
  <ellipse cx="15" cy="80" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(-60 15 80)"/>
</svg>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Main content -->
<div class="home-card">
  <div class="tag"><i class="fa-solid fa-heart"></i> &nbsp; Wedding Invitation &nbsp; <i class="fa-solid fa-heart"></i></div>

  <div class="couple-names">
    <span class="name">Fred</span>
    <span class="amp">&amp;</span>
    <span class="name">May</span>
  </div>

  <div class="divider"><i class="fa-solid fa-leaf"></i></div>

  <div class="date-block">
    <div class="date-text">September 5, 2026</div>
    <div class="location-text"><i class="fa-solid fa-location-dot" style="color:var(--rose-light);margin-right:0.3rem;font-size:0.7em"></i>Butuan City, Philippines</div>
  </div>

  <div class="countdown-strip">
    <div class="cd-unit"><div class="cd-num" id="cd-days">0</div><div class="cd-lbl">Days</div></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><div class="cd-num" id="cd-hours">00</div><div class="cd-lbl">Hrs</div></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><div class="cd-num" id="cd-mins">00</div><div class="cd-lbl">Min</div></div>
    <span class="cd-sep">:</span>
    <div class="cd-unit"><div class="cd-num" id="cd-secs">00</div><div class="cd-lbl">Sec</div></div>
  </div>

  <div class="env-btn" id="envBtn">
    <div class="env-scene">
      <!-- sparkles -->
      <span class="env-sparkle" style="left:8%;top:30%;animation-delay:0s">✨</span>
      <span class="env-sparkle" style="right:10%;top:20%;animation-delay:1s">💚</span>
      <span class="env-sparkle" style="left:20%;top:10%;animation-delay:2s">🌿</span>
      <div class="env-body">
        <div class="env-l"></div>
        <div class="env-r"></div>
        <div class="env-v"></div>
        <div class="env-letter">
          <div class="env-line"></div>
          <div class="env-line"></div>
          <div class="env-line"></div>
          <div class="env-line"></div>
        </div>
        <div class="env-flap"><div class="env-flap-inner"></div></div>
        <div class="env-seal">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(200,230,208,0.25)" stroke-width="1.5"/>
            <text x="50" y="58" text-anchor="middle" font-family="Great Vibes,Georgia,serif" font-size="34" font-style="italic" fill="rgba(255,255,255,0.9)">FM</text>
          </svg>
        </div>
      </div>
    </div>
    <span class="env-label">✉ Tap to Open Invitation</span>
  </div>
  <script>
    const envBtn = document.getElementById('envBtn');
    let envClicked = false;
    envBtn.addEventListener('click', function() {
      if(envClicked) return;
      envClicked = true;
      this.classList.add('opened');
      setTimeout(() => { window.location.href = '/invitation.html'; }, 700);
    });
  </script>
</div>


<script>
// ── STARS ──
const starsEl = document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star';
  const size=(Math.random()*2+0.8).toFixed(1);
  s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

// ── FLOATING HEARTS ──
const hc=document.getElementById('hearts-canvas');
const hx=hc.getContext('2d');
let W,H;
function resize(){W=hc.width=window.innerWidth;H=hc.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const COLORS=['#c8e6d0','#6aaa7a','#4a7a5a','#aad8b8','#d0eedd'];
class Heart{
  constructor(init){this.x=Math.random()*W;this.y=init?Math.random()*H:H+20;this.size=Math.random()*10+4;this.speed=Math.random()*0.5+0.15;this.opacity=Math.random()*0.25+0.04;this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=Math.random()*0.02+0.005;this.color=COLORS[Math.floor(Math.random()*COLORS.length)];}
  update(){this.y-=this.speed;this.wobble+=this.wobbleSpeed;this.x+=Math.sin(this.wobble)*0.5;if(this.y<-20){this.y=H+20;this.x=Math.random()*W;}}
  draw(){hx.save();hx.globalAlpha=this.opacity;hx.fillStyle=this.color;hx.translate(this.x,this.y);const s=this.size/10;hx.beginPath();hx.moveTo(0,-2*s);hx.bezierCurveTo(5*s,-7*s,10*s,0,0,8*s);hx.bezierCurveTo(-10*s,0,-5*s,-7*s,0,-2*s);hx.fill();hx.restore();}
}
const hearts=Array.from({length:35},(_,i)=>new Heart(true));
function animateHearts(){hx.clearRect(0,0,W,H);hearts.forEach(h=>{h.update();h.draw();});requestAnimationFrame(animateHearts);}
animateHearts();

// ── COUNTDOWN ──
const wedding=new Date('2026-09-05T13:00:00');
function pad(n){return String(Math.max(0,n)).padStart(2,'0');}
const dEl=document.getElementById('cd-days'),hEl=document.getElementById('cd-hours'),mEl=document.getElementById('cd-mins'),sEl=document.getElementById('cd-secs');
function tick(){
  const diff=wedding-new Date();
  if(diff<=0){dEl.textContent='0';hEl.textContent=mEl.textContent=sEl.textContent='00';return;}
  const d=Math.floor(diff/864e5),h=Math.floor((diff%864e5)/36e5),m=Math.floor((diff%36e5)/6e4),s=Math.floor((diff%6e4)/1e3);
  dEl.textContent=String(d);hEl.textContent=pad(h);mEl.textContent=pad(m);sEl.textContent=pad(s);
}
tick();setInterval(tick,1000);


// ── DOUBLE TAP BURST ──
let lastTap=0;
document.addEventListener('click',(e)=>{
  const now=Date.now();
  if(now-lastTap<400){for(let i=0;i<12;i++){const h=document.createElement('span');h.textContent=['💚','🌿','✨','💗','🌸'][Math.floor(Math.random()*5)];h.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${1+Math.random()*1.5}rem;pointer-events:none;z-index:9999;animation:burstHeart 0.9s ease forwards;--dx:${(Math.random()-0.5)*120}px;--dy:${-(Math.random()*100+40)}px;`;document.body.appendChild(h);setTimeout(()=>h.remove(),950);}}
  lastTap=now;
});
</script>
</body>
</html>
