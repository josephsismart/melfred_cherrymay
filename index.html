<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fred &amp; Chem — Forever Begins Here | Sept 5, 2026</title>
  <meta property="og:title" content="💍 Fred &amp; Chem — Forever Begins Here"/>
  <meta property="og:description" content="You're invited! Join us as Fred and Chem say 'I Do' on September 5, 2026 in Butuan City, Philippines. Click to open your digital invitation 💌"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mc-wedding-2026.vercel.app/"/>
  <meta property="og:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:type" content="image/jpeg"/>
  <meta property="og:site_name" content="Fred &amp; Chem Wedding"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #4a7a5a; --green-light: #6aaa7a; --blush: #c8e6d0;
      --gold: #d4a84b; --dark: #051a0a; --dark-mid: #0d3322;
    }
    html, body { min-height: 100%; overflow-x: hidden; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(160deg, #051a0a 0%, #0d3322 45%, #162e1f 75%, #051a0a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; position: relative;
      overflow: hidden;
    }

    /* ── STARS ── */
    #hearts-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%; background: rgba(255,255,255,0.7);
      animation: twinkle var(--dur,3s) var(--delay,0s) infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:0.1;transform:scale(0.8)} 100%{opacity:0.9;transform:scale(1.2)} }

    /* ══════════════════════════════════════
       ENVELOPE — CENTER STAGE
    ══════════════════════════════════════ */
    .env-wrap {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      gap: 1.2rem;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .env-wrap.hide {
      opacity: 0; transform: scale(0.85) translateY(-20px);
      pointer-events: none;
    }

    /* Wiggle */
    @keyframes envWiggle {
      0%,55%,100% { transform: rotate(0deg) scale(1); }
      58%  { transform: rotate(-6deg) scale(1.04); }
      63%  { transform: rotate(6deg)  scale(1.04); }
      68%  { transform: rotate(-4deg) scale(1.02); }
      73%  { transform: rotate(4deg)  scale(1.02); }
      78%  { transform: rotate(-2deg) scale(1.01); }
      83%  { transform: rotate(2deg)  scale(1.01); }
      88%  { transform: rotate(0deg)  scale(1); }
    }
    @keyframes envGlow {
      0%,100%{filter:drop-shadow(0 12px 36px rgba(74,122,90,0.45))}
      50%{filter:drop-shadow(0 20px 56px rgba(106,170,122,0.8))}
    }

    .env-scene {
      position: relative;
      width: clamp(310px, 86vw, 430px);
      perspective: 900px;
      animation: envWiggle 3.2s 1.5s infinite, envGlow 2.6s 2s infinite;
      transform-origin: center center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .env-scene.opened { animation: envGlow 2.6s infinite; }

    .env-body {
      width: 100%; aspect-ratio: 1.55/1;
      border-radius: 6px 6px 20px 20px; position: relative;
      box-shadow: 0 28px 80px rgba(0,0,0,0.55), 0 6px 22px rgba(0,0,0,0.35);
      overflow: hidden;
      background: linear-gradient(150deg,#dff2e6,#c2e0cc);
    }
    .env-v { position:absolute;inset:0;background:linear-gradient(160deg,#aacfb8,#8fc0a0);clip-path:polygon(0 100%,50% 54%,100% 100%);border-radius:0 0 20px 20px; }
    .env-l { position:absolute;inset:0;background:linear-gradient(145deg,#c8e8d2,#aacfb8);clip-path:polygon(0 0,0 100%,50% 54%); }
    .env-r { position:absolute;inset:0;background:linear-gradient(145deg,#c0e2ca,#a2c8b0);clip-path:polygon(100% 0,100% 100%,50% 54%); }

    .env-peek {
      position:absolute; bottom:0; left:12%; right:12%; height:65%;
      background:linear-gradient(170deg,#fff,#f2fbf5);
      border-radius:4px 4px 0 0;
      box-shadow:0 -4px 16px rgba(0,0,0,0.1);
      opacity:0; transform:translateY(100%);
      transition: transform 0.7s 0.2s cubic-bezier(0.34,1.3,0.64,1), opacity 0.2s 0.25s;
      z-index:6;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:12px;
    }
    .env-peek::before { content:'F & C'; font-family:'Great Vibes',cursive; font-size:1.7rem; color:rgba(74,122,90,0.4); }
    .env-peek-line { height:2px; background:rgba(74,122,90,0.15); border-radius:2px; width:80%; }
    .env-peek-line:nth-child(3){width:60%;}
    .env-peek-line:nth-child(4){width:72%;}

    .env-seal {
      position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
      width:60px; height:60px; border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#4a7a5a,#0d3322);
      box-shadow:0 4px 22px rgba(0,0,0,0.5),0 0 0 4px rgba(200,230,208,0.2);
      display:flex; align-items:center; justify-content:center; z-index:20;
      transition:transform 0.4s, opacity 0.4s;
    }
    .env-seal svg { width:42px; height:42px; }
    .env-flap {
      position:absolute; top:0; left:0; right:0; height:54%;
      transform-origin:top center;
      transition:transform 0.65s cubic-bezier(0.4,0,0.2,1); z-index:15;
    }
    .env-flap-inner { position:absolute;inset:0;background:linear-gradient(160deg,#d0ecda,#b4d4c0);clip-path:polygon(0 0,100% 0,50% 88%);border-radius:6px 6px 0 0; }
    .env-flap-inner::after { content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,0.28),transparent 60%);clip-path:polygon(0 0,100% 0,50% 88%); }

    /* OPENED states */
    .env-scene.opened .env-flap { transform:rotateX(-175deg); z-index:4; }
    .env-scene.opened .env-peek { transform:translateY(-30%); opacity:1; }
    .env-scene.opened .env-seal { transform:translateX(-50%) scale(0.8); opacity:0; }

    /* Tap label */
    .env-label {
      font-size:clamp(0.68rem,2.2vw,0.82rem); letter-spacing:0.22em; text-transform:uppercase;
      color:rgba(200,230,208,0.7); transition:opacity 0.4s;
    }
    .env-tap-hint {
      display:flex; align-items:center; gap:0.4rem;
      font-size:0.82rem; color:rgba(200,230,208,0.4);
      animation:tapPulse 1.8s ease-in-out infinite;
    }
    .tap-finger { animation:fingerBounce 1.8s ease-in-out infinite; font-size:1.3rem; }
    @keyframes tapPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    @keyframes fingerBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

    /* ══════════════════════════════════════
       CORNER FLOWER BORDERS
       Each corner has a cluster of flowers
       that animate in after envelope opens
    ══════════════════════════════════════ */
    .corner-border {
      position: fixed; z-index: 30; pointer-events: none;
      width: clamp(100px, 28vw, 180px);
      height: clamp(100px, 28vw, 180px);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .corner-border.tl { top: 0; left: 0; }
    .corner-border.tr { top: 0; right: 0; transform: scaleX(-1); }
    .corner-border.bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner-border.br { bottom: 0; right: 0; transform: scale(-1); }
    .corner-border.show { opacity: 1; }

    .corner-border .cf {
      position: absolute;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      opacity: 0;
      transform: scale(0) rotate(0deg);
      transition: opacity 0.4s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .corner-border.show .cf { opacity: 1; transform: scale(1) rotate(var(--r, 0deg)); }

    /* Flower positions for TL corner (others are mirrored via CSS transform) */
    .cf:nth-child(1)  { top:0;   left:0;   --r:-15deg; transition-delay: 0.05s; }
    .cf:nth-child(2)  { top:0;   left:30%; --r:5deg;   transition-delay: 0.1s; }
    .cf:nth-child(3)  { top:0;   left:58%; --r:-8deg;  transition-delay: 0.15s; }
    .cf:nth-child(4)  { top:25%; left:0;   --r:10deg;  transition-delay: 0.2s; }
    .cf:nth-child(5)  { top:20%; left:28%; --r:-20deg; transition-delay: 0.25s; }
    .cf:nth-child(6)  { top:18%; left:52%; --r:15deg;  transition-delay: 0.3s; }
    .cf:nth-child(7)  { top:48%; left:0;   --r:-5deg;  transition-delay: 0.35s; }
    .cf:nth-child(8)  { top:44%; left:24%; --r:25deg;  transition-delay: 0.4s; }
    .cf:nth-child(9)  { top:68%; left:0;   --r:10deg;  transition-delay: 0.45s; }
    .cf:nth-child(10) { top:38%; left:46%; --r:-18deg; transition-delay: 0.5s; }

    /* Float animation after bloom */
    @keyframes cfFloat {
      0%,100%{transform:scale(1) rotate(var(--r,0deg)) translateY(0)}
      50%{transform:scale(1.08) rotate(var(--r,0deg)) translateY(-4px)}
    }
    .corner-border.show .cf { animation: cfFloat 3s var(--fdelay,0s) ease-in-out infinite; }
    .cf:nth-child(1)  { --fdelay:0s; }
    .cf:nth-child(2)  { --fdelay:0.3s; }
    .cf:nth-child(3)  { --fdelay:0.6s; }
    .cf:nth-child(4)  { --fdelay:0.9s; }
    .cf:nth-child(5)  { --fdelay:1.2s; }
    .cf:nth-child(6)  { --fdelay:0.4s; }
    .cf:nth-child(7)  { --fdelay:0.7s; }
    .cf:nth-child(8)  { --fdelay:1.0s; }
    .cf:nth-child(9)  { --fdelay:0.2s; }
    .cf:nth-child(10) { --fdelay:0.5s; }

    /* ══════════════════════════════════════
       CENTER REVEAL — couple photo + details
    ══════════════════════════════════════ */
    #reveal-card {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; transform: scale(0.9);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34,1.2,0.64,1);
      pointer-events: none;
    }
    #reveal-card.show {
      opacity: 1; transform: scale(1);
      pointer-events: all;
    }

    /* Couple photo — arched portrait */
    .couple-photo-wrap {
      width: clamp(110px, 30vw, 160px);
      height: clamp(140px, 38vw, 200px);
      border-radius: 100px 100px 70px 70px;
      border: 3px solid rgba(200,230,208,0.35);
      box-shadow: 0 12px 50px rgba(0,0,0,0.55), 0 0 0 8px rgba(74,122,90,0.12), 0 0 30px rgba(106,170,122,0.3);
      overflow: hidden;
      background: linear-gradient(135deg, #1e5238, #0d3322);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.2rem;
      animation: photoGlow 3s ease-in-out infinite;
    }
    @keyframes photoGlow {
      0%,100%{box-shadow:0 12px 50px rgba(0,0,0,0.55),0 0 0 8px rgba(74,122,90,0.12),0 0 30px rgba(106,170,122,0.3)}
      50%{box-shadow:0 12px 50px rgba(0,0,0,0.55),0 0 0 8px rgba(74,122,90,0.2),0 0 50px rgba(106,170,122,0.5)}
    }
    .couple-photo-wrap img { width:100%; height:100%; object-fit:cover; display:none; }
    .couple-photo-placeholder {
      font-family:'Great Vibes',cursive;
      font-size:2.6rem; color:rgba(200,230,208,0.5);
    }

    .reveal-tag {
      font-size:0.58rem; letter-spacing:0.3em; text-transform:uppercase;
      color:var(--gold); margin-bottom:0.6rem; opacity:0.9;
    }

    .reveal-names {
      font-family:'Great Vibes',cursive;
      font-size:clamp(2.8rem,11vw,4rem);
      color:#c8e6d0; line-height:1; margin-bottom:0.5rem;
      text-shadow:0 0 60px rgba(106,170,122,0.5);
    }
    .reveal-amp { color:var(--gold); }

    .reveal-divider {
      width:70px; height:1px;
      background:linear-gradient(90deg,transparent,rgba(212,168,75,0.6),transparent);
      margin:0 auto 0.8rem;
    }

    .reveal-details {
      display:flex; flex-direction:column; gap:4px; margin-bottom:1.4rem;
      text-align:center;
    }
    .reveal-detail-row {
      font-size:clamp(0.68rem,2vw,0.78rem);
      color:rgba(200,230,208,0.72); letter-spacing:0.04em;
    }
    .reveal-detail-row strong { color:rgba(200,230,208,0.95); font-weight:600; }
    .reveal-detail-row .di { color:var(--gold); margin-right:4px; }

    .reveal-cta {
      display:block; width:100%; max-width:300px;
      background:linear-gradient(135deg,#4a7a5a,#2a5a3a);
      color:#c8e6d0; border:none; border-radius:50px;
      padding:0.95rem 2rem;
      font-family:'Poppins',sans-serif;
      font-size:0.8rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      box-shadow:0 8px 28px rgba(74,122,90,0.5);
      animation:ctaPulse 2s 0.5s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%,100%{box-shadow:0 8px 28px rgba(74,122,90,0.5)}
      50%{box-shadow:0 8px 44px rgba(106,170,122,0.75),0 0 0 6px rgba(74,122,90,0.15)}
    }
    .reveal-cta:active { transform:scale(0.97); }

    @keyframes fadeIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @keyframes burstHeart { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0} }
  </style>
</head>
<body>
<canvas id="hearts-canvas"></canvas>
<div class="stars" id="stars"></div>

<!-- ══ 4 CORNER FLOWER BORDERS ══ -->
<div class="corner-border tl" id="cb-tl">
  <span class="cf">🌸</span><span class="cf">🌺</span><span class="cf">🌷</span>
  <span class="cf">🌹</span><span class="cf">🌸</span><span class="cf">🌺</span>
  <span class="cf">🍀</span><span class="cf">🌿</span><span class="cf">🌸</span><span class="cf">🌷</span>
</div>
<div class="corner-border tr" id="cb-tr">
  <span class="cf">🌺</span><span class="cf">🌸</span><span class="cf">🌹</span>
  <span class="cf">🌷</span><span class="cf">🌺</span><span class="cf">🌸</span>
  <span class="cf">🌿</span><span class="cf">🍀</span><span class="cf">🌺</span><span class="cf">🌸</span>
</div>
<div class="corner-border bl" id="cb-bl">
  <span class="cf">🌷</span><span class="cf">🌹</span><span class="cf">🌸</span>
  <span class="cf">🌺</span><span class="cf">🌷</span><span class="cf">🌹</span>
  <span class="cf">🍀</span><span class="cf">🌿</span><span class="cf">🌸</span><span class="cf">🌺</span>
</div>
<div class="corner-border br" id="cb-br">
  <span class="cf">🌹</span><span class="cf">🌷</span><span class="cf">🌺</span>
  <span class="cf">🌸</span><span class="cf">🌹</span><span class="cf">🌷</span>
  <span class="cf">🌿</span><span class="cf">🍀</span><span class="cf">🌺</span><span class="cf">🌹</span>
</div>

<!-- ══ ENVELOPE ══ -->
<div class="env-wrap" id="envWrap">
  <div class="env-scene" id="envScene">
    <div class="env-body">
      <div class="env-l"></div>
      <div class="env-r"></div>
      <div class="env-v"></div>
      <div class="env-peek">
        <div class="env-peek-line"></div>
        <div class="env-peek-line"></div>
        <div class="env-peek-line"></div>
      </div>
      <div class="env-flap"><div class="env-flap-inner"></div></div>
    </div>
    <div class="env-seal">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(200,230,208,0.25)" stroke-width="1.5"/>
        <text x="50" y="60" text-anchor="middle" font-family="Great Vibes,Georgia,serif" font-size="36" font-style="italic" fill="rgba(255,255,255,0.9)">FC</text>
      </svg>
    </div>
  </div>
  <span class="env-label">✉ &nbsp; You Have a Special Invitation</span>
  <div class="env-tap-hint">
    <span class="tap-finger">👆</span>
    <span>Tap to open</span>
  </div>
</div>

<!-- ══ CENTER REVEAL (couple + details) ══ -->
<div id="reveal-card">
  <div class="couple-photo-wrap">
    <img id="couplePhoto" src="" alt="Fred &amp; Chem"/>
    <div class="couple-photo-placeholder">F&C</div>
  </div>

  <p class="reveal-tag">✦ &nbsp; You're Invited &nbsp; ✦</p>
  <div class="reveal-names">Fred <span class="reveal-amp">&amp;</span> Chem</div>
  <div class="reveal-divider"></div>

  <div class="reveal-details">
    <div class="reveal-detail-row"><span class="di">📅</span><strong>September 5, 2026</strong> &nbsp;·&nbsp; Saturday, 1:00 PM</div>
    <div class="reveal-detail-row"><span class="di">⛪</span>Birhen sa Kasilak Mindanao Shrine Parish</div>
    <div class="reveal-detail-row"><span class="di">🥂</span>The Pavilion at the Watergate</div>
    <div class="reveal-detail-row"><span class="di">📍</span>Butuan City, Agusan del Norte, Philippines</div>
  </div>

  <button class="reveal-cta" id="viewDetailsBtn">
    Tap to View Invitation &nbsp; →
  </button>
</div>

<script>
const envScene   = document.getElementById('envScene');
const envWrap    = document.getElementById('envWrap');
const revealCard = document.getElementById('reveal-card');
const corners    = ['cb-tl','cb-tr','cb-bl','cb-br'].map(id => document.getElementById(id));
let opened = false;

envScene.addEventListener('click', function () {
  if (opened) return;
  opened = true;

  // 1. Flap opens
  envScene.classList.add('opened');

  // 2. Flower corners bloom in (staggered per corner)
  setTimeout(() => {
    corners.forEach((c, i) => {
      setTimeout(() => c.classList.add('show'), i * 80);
    });
  }, 200);

  // 3. Envelope fades out
  setTimeout(() => envWrap.classList.add('hide'), 500);

  // 4. Couple reveal fades in center
  setTimeout(() => revealCard.classList.add('show'), 700);
});

document.getElementById('viewDetailsBtn').addEventListener('click', () => {
  window.location.href = '/invitation.html';
});

// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = (Math.random() * 2 + 0.8).toFixed(1);
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

// ── FLOATING HEARTS ──
const hc = document.getElementById('hearts-canvas');
const hx = hc.getContext('2d');
let W, H;
function resize() { W = hc.width = window.innerWidth; H = hc.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const COLORS = ['#c8e6d0','#6aaa7a','#4a7a5a','#aad8b8','#d0eedd'];
class Heart {
  constructor(init) { this.x=Math.random()*W; this.y=init?Math.random()*H:H+20; this.size=Math.random()*10+4; this.speed=Math.random()*0.5+0.15; this.opacity=Math.random()*0.22+0.04; this.wobble=Math.random()*Math.PI*2; this.wobbleSpeed=Math.random()*0.02+0.005; this.color=COLORS[Math.floor(Math.random()*COLORS.length)]; }
  update() { this.y-=this.speed; this.wobble+=this.wobbleSpeed; this.x+=Math.sin(this.wobble)*0.5; if(this.y<-20){this.y=H+20;this.x=Math.random()*W;} }
  draw() { hx.save(); hx.globalAlpha=this.opacity; hx.fillStyle=this.color; hx.translate(this.x,this.y); const s=this.size/10; hx.beginPath(); hx.moveTo(0,-2*s); hx.bezierCurveTo(5*s,-7*s,10*s,0,0,8*s); hx.bezierCurveTo(-10*s,0,-5*s,-7*s,0,-2*s); hx.fill(); hx.restore(); }
}
const hearts = Array.from({length:35}, (_,i) => new Heart(true));
function animateHearts() { hx.clearRect(0,0,W,H); hearts.forEach(h=>{h.update();h.draw();}); requestAnimationFrame(animateHearts); }
animateHearts();

// ── DOUBLE TAP BURST ──
let lastTap = 0;
document.addEventListener('click', (e) => {
  const now = Date.now();
  if (now - lastTap < 400) {
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('span');
      h.textContent = ['💚','🌿','✨','💗','🌸','🌺'][Math.floor(Math.random()*6)];
      h.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${1+Math.random()*1.5}rem;pointer-events:none;z-index:9999;animation:burstHeart 0.9s ease forwards;--dx:${(Math.random()-0.5)*120}px;--dy:${-(Math.random()*100+40)}px;`;
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 950);
    }
  }
  lastTap = now;
});
</script>
</body>
</html>
