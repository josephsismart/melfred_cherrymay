<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fred &amp; Chem — Forever Begins Here | Sept 5, 2026</title>
  <meta property="og:title" content="💍 Fred &amp; Chem — Forever Begins Here"/>
  <meta property="og:description" content="You're invited! Join us as Fred and Chem say 'I Do' on September 5, 2026 in Butuan City, Philippines."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mc-wedding-2026.vercel.app/"/>
  <meta property="og:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <meta property="og:site_name" content="Fred &amp; Chem Wedding"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:       #4a7a5a;
      --green-light: #6aaa7a;
      --green-pale:  #c8e6d0;
      --gold:        #d4a84b;
      --dark:        #051a0a;
      --dark-mid:    #0d3322;
    }
    html { height: 100%; overflow-x: hidden; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(160deg, #051a0a 0%, #0d3322 45%, #162e1f 75%, #051a0a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; position: relative; overflow: hidden;
      font-family: 'Poppins', sans-serif;
      padding: max(env(safe-area-inset-top, 0px), 1.5rem) 1rem max(env(safe-area-inset-bottom, 0px), 1rem);
    }

    /* ── CANVAS / STARS ── */
    #hearts-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.7);
            animation: twinkle var(--dur,3s) var(--delay,0s) infinite alternate; }
    @keyframes twinkle { 0%{opacity:0.1;transform:scale(0.8)} 100%{opacity:0.9;transform:scale(1.2)} }

    /* ══════════════════════════════════════════
       CORNER VINE / LEAF DECORATIONS
    ══════════════════════════════════════════ */
    /* ── corner leaf fade-in ── */
    @keyframes leafFadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .corner-wrap {
      position: fixed; z-index: 5; pointer-events: none;
      width: clamp(220px, 45vw, 340px);
      height: auto;
      opacity: 0;
      animation: leafFadeIn 1.2s ease forwards;
      overflow: visible;
    }
    .corner-wrap .c-inner { width: 100%; display: block; }
    /* TL: overflow top-left — shift image so it bleeds off corner */
    .corner-wrap.tl { top: -5%; left: -5%; animation-delay: 0.1s; }
    .corner-wrap.tl .c-inner { transform: scaleY(-1); }
    /* TR: overflow top-right */
    .corner-wrap.tr { top: -5%; right: -5%; animation-delay: 0.3s; }
    .corner-wrap.tr .c-inner { transform: scale(-1,-1); }
    /* BL: overflow bottom-left */
    .corner-wrap.bl { bottom: -5%; left: -5%; animation-delay: 0.5s; }
    .corner-wrap.bl .c-inner { transform: none; }
    /* BR: overflow bottom-right */
    .corner-wrap.br { bottom: -5%; right: -5%; animation-delay: 0.7s; }
    .corner-wrap.br .c-inner { transform: scaleX(-1); }
    .corner-wrap img { width: 100%; height: auto; display: block; }

    /* ══════════════════════════════════════════
       ENVELOPE
    ══════════════════════════════════════════ */
    .env-wrap {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .env-wrap.hide { opacity: 0; transform: scale(0.82) translateY(-22px); pointer-events: none; }

    /* SHAKE — runs immediately and loops */
    @keyframes envShake {
      0%,100%  { transform: rotate(0deg) scale(1); }
      10%      { transform: rotate(-7deg) scale(1.04); }
      20%      { transform: rotate(7deg)  scale(1.04); }
      30%      { transform: rotate(-5deg) scale(1.03); }
      40%      { transform: rotate(5deg)  scale(1.03); }
      50%      { transform: rotate(-3deg) scale(1.02); }
      60%      { transform: rotate(3deg)  scale(1.02); }
      70%      { transform: rotate(-1deg) scale(1.01); }
      80%      { transform: rotate(1deg)  scale(1.01); }
      90%,100% { transform: rotate(0deg) scale(1); }
    }
    @keyframes envGlow {
      0%,100%{ filter:drop-shadow(0 12px 36px rgba(74,122,90,0.5)); }
      50%    { filter:drop-shadow(0 22px 58px rgba(106,170,122,0.85)); }
    }

    .env-scene {
      position: relative;
      width: clamp(270px, 80vw, 400px);
      perspective: 900px;
      /* shake every 2.5 s, short sharp burst */
      animation: envShake 0.7s 1.2s ease-in-out, envShake 0.7s 3.5s ease-in-out,
                 envShake 0.7s 5.8s ease-in-out, envShake 0.7s 8.1s ease-in-out,
                 envGlow 2.8s 1s infinite;
      transform-origin: center center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .env-scene.opened { animation: envGlow 2.8s infinite; }

    .env-body {
      width: 100%; aspect-ratio: 1.55/1;
      border-radius: 6px 6px 20px 20px; position: relative;
      box-shadow: 0 28px 80px rgba(0,0,0,0.55), 0 6px 22px rgba(0,0,0,0.3);
      overflow: hidden;
      background: linear-gradient(150deg,#dff2e6,#c2e0cc);
    }
    .env-v { position:absolute;inset:0;background:linear-gradient(160deg,#aacfb8,#8fc0a0);clip-path:polygon(0 100%,50% 54%,100% 100%);border-radius:0 0 20px 20px; }
    .env-l { position:absolute;inset:0;background:linear-gradient(145deg,#c8e8d2,#aacfb8);clip-path:polygon(0 0,0 100%,50% 54%); }
    .env-r { position:absolute;inset:0;background:linear-gradient(145deg,#c0e2ca,#a2c8b0);clip-path:polygon(100% 0,100% 100%,50% 54%); }
    .env-peek {
      position:absolute; bottom:0; left:12%; right:12%; height:65%;
      background:linear-gradient(170deg,#fff,#f2fbf5);
      border-radius:4px 4px 0 0;
      box-shadow:0 -4px 16px rgba(0,0,0,0.1);
      opacity:0; transform:translateY(100%);
      transition: transform 1.2s 0.35s cubic-bezier(0.34,1.1,0.64,1), opacity 0.3s 0.4s;
      z-index:6;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:12px;
    }
    .env-peek::before { content:'Fred & Chem'; font-family:'Great Vibes',cursive; font-size:clamp(1.6rem,5vw,2.2rem); color:#1e5238; text-shadow:0 1px 6px rgba(200,230,208,0.5); font-weight:400; }
    .env-peek-line { height:2px; background:rgba(74,122,90,0.15); border-radius:2px; width:80%; }
    .env-peek-line:nth-child(3){width:60%;}
    .env-peek-line:nth-child(4){width:72%;}

    .env-seal {
      position:absolute; bottom:-28px; left:50%; transform:translateX(-50%);
      width:60px; height:60px; border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#4a7a5a,#0d3322);
      box-shadow:0 4px 22px rgba(0,0,0,0.5),0 0 0 4px rgba(200,230,208,0.2);
      display:flex; align-items:center; justify-content:center; z-index:20;
      transition:transform 0.4s, opacity 0.4s;
    }
    .env-seal svg { width:42px; height:42px; }
    .env-flap {
      position:absolute; top:0; left:0; right:0; height:54%;
      transform-origin:top center;
      transition:transform 1.0s cubic-bezier(0.4,0,0.2,1); z-index:15;
    }
    .env-flap-inner { position:absolute;inset:0;background:linear-gradient(160deg,#d0ecda,#b4d4c0);clip-path:polygon(0 0,100% 0,50% 88%);border-radius:6px 6px 0 0; }
    .env-flap-inner::after { content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,0.28),transparent 60%);clip-path:polygon(0 0,100% 0,50% 88%); }

    .env-scene.opened .env-flap { transform:rotateX(-175deg); z-index:4; }
    .env-scene.opened .env-peek { transform:translateY(-42%); opacity:1; }
    .env-scene.opened .env-seal { transform:translateX(-50%) scale(0.8); opacity:0; }

    /* Tap label */
    .env-label {
      font-size:clamp(0.68rem,2.2vw,0.82rem); letter-spacing:0.22em; text-transform:uppercase;
      color:rgba(200,230,208,0.7); transition:opacity 0.4s; margin-top:2rem;
    }
    .env-label i { margin-right: 6px; color: var(--gold); }
    .env-tap-hint {
      display:flex; align-items:center; gap:0.5rem;
      font-size:0.82rem; color:rgba(200,230,208,0.45);
      animation:tapPulse 1.8s ease-in-out infinite;
    }
    .env-tap-hint i { font-size:1.1rem; animation:fingerBounce 1.8s ease-in-out infinite; }
    @keyframes tapPulse   { 0%,100%{opacity:0.4} 50%{opacity:1} }
    @keyframes fingerBounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }

    /* ══════════════════════════════════════════
       CENTER REVEAL CARD
    ══════════════════════════════════════════ */
    #reveal-card {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 1rem;
      opacity: 0; transform: scale(0.88);
      transition: opacity 0.65s ease, transform 0.65s cubic-bezier(0.34,1.2,0.64,1);
      pointer-events: none;
    }
    #reveal-card.show { opacity: 1; transform: scale(1); pointer-events: all; }

    .couple-photo-wrap {
      width: clamp(110px, 30vw, 160px); height: clamp(140px, 38vw, 200px);
      border-radius: 100px 100px 70px 70px;
      border: 3px solid rgba(200,230,208,0.35);
      box-shadow: 0 12px 50px rgba(0,0,0,0.6), 0 0 0 8px rgba(74,122,90,0.12);
      overflow: hidden;
      background: linear-gradient(135deg, #1e5238, #0d3322);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.1rem;
    }
    .couple-photo-wrap img { width:100%; height:100%; object-fit:cover; display:none; }
    .couple-photo-placeholder {
      font-family:'Great Vibes',cursive; font-size:2.6rem; color:rgba(200,230,208,0.5);
    }

    .reveal-tag {
      font-size:0.58rem; letter-spacing:0.3em; text-transform:uppercase;
      color:var(--gold); margin-bottom:0.5rem;
    }
    .reveal-tag i { margin: 0 4px; }

    .reveal-names {
      font-family:'Great Vibes',cursive;
      font-size:clamp(2.8rem,11vw,3.8rem);
      color:#c8e6d0; line-height:1; margin-bottom:0.45rem;
      text-shadow:0 0 60px rgba(106,170,122,0.5);
    }
    .reveal-amp { color:var(--gold); }

    .reveal-divider {
      width:70px; height:1px;
      background:linear-gradient(90deg,transparent,rgba(212,168,75,0.6),transparent);
      margin:0 auto 0.85rem;
    }

    .reveal-details { display:flex; flex-direction:column; gap:5px; margin-bottom:1.4rem; text-align:center; }
    .reveal-detail-row {
      font-size:clamp(0.68rem,2vw,0.78rem); color:rgba(200,230,208,0.72); letter-spacing:0.03em;
    }
    .reveal-detail-row i { color:var(--gold); margin-right:6px; width:14px; }
    .reveal-detail-row strong { color:rgba(200,230,208,0.95); font-weight:600; }

    .reveal-cta {
      display:block; width:100%; max-width:300px;
      background:linear-gradient(135deg,#4a7a5a,#2a5a3a);
      color:#c8e6d0; border:none; border-radius:50px;
      padding:0.95rem 2rem;
      font-family:'Poppins',sans-serif;
      font-size:0.8rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      box-shadow:0 8px 28px rgba(74,122,90,0.5);
      animation:ctaPulse 2s 0.5s ease-in-out infinite;
    }
    .reveal-cta i { margin-left: 8px; }
    @keyframes ctaPulse {
      0%,100%{box-shadow:0 8px 28px rgba(74,122,90,0.5)}
      50%{box-shadow:0 8px 44px rgba(106,170,122,0.75),0 0 0 6px rgba(74,122,90,0.15)}
    }
    .reveal-cta:active { transform:scale(0.97); }

    @keyframes burstHeart { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0} }
  </style>
</head>
<body>
<canvas id="hearts-canvas"></canvas>
<div class="stars" id="stars"></div>

<!-- ══ CORNER VINE DECORATIONS ══ -->
<div class="corner-wrap tl" id="cb-tl"><div class="c-inner"><img src="/leaves.png" alt=""/></div></div>
<div class="corner-wrap tr" id="cb-tr"><div class="c-inner"><img src="/leaves.png" alt=""/></div></div>
<div class="corner-wrap bl" id="cb-bl"><div class="c-inner"><img src="/leaves.png" alt=""/></div></div>
<div class="corner-wrap br" id="cb-br"><div class="c-inner"><img src="/leaves.png" alt=""/></div></div>

<!-- ══ ENVELOPE ══ -->
<div class="env-wrap" id="envWrap">
  <div class="env-scene" id="envScene">
    <div class="env-body">
      <div class="env-l"></div><div class="env-r"></div><div class="env-v"></div>
      <div class="env-peek">
        <div class="env-peek-line"></div>
        <div class="env-peek-line"></div>
        <div class="env-peek-line"></div>
      </div>
      <div class="env-flap"><div class="env-flap-inner"></div></div>
    </div>
  </div>
  <span class="env-label"><i class="fa-regular fa-envelope"></i>You Have a Special Invitation</span>
  <div class="env-tap-hint">
    <i class="fa-solid fa-hand-pointer"></i>
    <span>Tap to open</span>
  </div>
</div>


<script>
const envScene   = document.getElementById('envScene');
const envWrap    = document.getElementById('envWrap');
const revealCard = document.getElementById('reveal-card');
const corners    = ['cb-tl','cb-tr','cb-bl','cb-br'].map(id => document.getElementById(id));
let opened = false;

// ── REWIND: letter goes back into envelope ──
function doRewind() {
  // Make sure envelope shows as open first, then animate close
  opened = true;
  envScene.classList.add('opened');
  setTimeout(() => {
    envScene.classList.remove('opened');
    setTimeout(() => { opened = false; }, 1400);
  }, 700);
}

const urlRewind = new URLSearchParams(window.location.search).get('rewind') === '1';
if (urlRewind) {
  doRewind();
  history.replaceState(null, '', '/');
}

// pageshow fires on BOTH normal load AND browser back button (bfcache restore)
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    // Browser back restored page from bfcache — envelope is already visually open
    // Just animate it closed after a short pause
    if (opened) {
      setTimeout(() => {
        envScene.classList.remove('opened');
        setTimeout(() => { opened = false; }, 1400);
      }, 600);
    }
  } else {
    // Normal/fresh load — check sessionStorage flag set by invitation.html
    const backFlag = sessionStorage.getItem('fromInvitation') === '1';
    if (backFlag && !urlRewind) {
      sessionStorage.removeItem('fromInvitation');
      doRewind();
    }
  }
});

envScene.addEventListener('click', function () {
  if (opened) return;
  opened = true;

  // 1. Flap opens
  envScene.classList.add('opened');

  // 2. Corner vines bloom in
  setTimeout(() => {
    corners.forEach((c, i) => setTimeout(() => c.classList.add('show'), i * 80));
  }, 200);

  // 3. Navigate to invitation
  setTimeout(() => {
    window.location.href = '/invitation.html?play=1';
  }, 2200);
});

// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = (Math.random() * 2 + 0.8).toFixed(1);
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

// ── FLOATING HEARTS ──
const hc = document.getElementById('hearts-canvas');
const hx = hc.getContext('2d');
let W, H;
function resize() { W = hc.width = window.innerWidth; H = hc.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const COLORS = ['#c8e6d0','#6aaa7a','#4a7a5a','#aad8b8','#d0eedd'];
class Heart {
  constructor(init) { this.x=Math.random()*W; this.y=init?Math.random()*H:H+20; this.size=Math.random()*10+4; this.speed=Math.random()*0.5+0.15; this.opacity=Math.random()*0.22+0.04; this.wobble=Math.random()*Math.PI*2; this.wobbleSpeed=Math.random()*0.02+0.005; this.color=COLORS[Math.floor(Math.random()*COLORS.length)]; }
  update() { this.y-=this.speed; this.wobble+=this.wobbleSpeed; this.x+=Math.sin(this.wobble)*0.5; if(this.y<-20){this.y=H+20;this.x=Math.random()*W;} }
  draw() { hx.save(); hx.globalAlpha=this.opacity; hx.fillStyle=this.color; hx.translate(this.x,this.y); const s=this.size/10; hx.beginPath(); hx.moveTo(0,-2*s); hx.bezierCurveTo(5*s,-7*s,10*s,0,0,8*s); hx.bezierCurveTo(-10*s,0,-5*s,-7*s,0,-2*s); hx.fill(); hx.restore(); }
}
const hearts = Array.from({length:35}, (_,i) => new Heart(true));
function animateHearts() { hx.clearRect(0,0,W,H); hearts.forEach(h=>{h.update();h.draw();}); requestAnimationFrame(animateHearts); }
animateHearts();

// ── DOUBLE TAP BURST ──
let lastTap = 0;
document.addEventListener('click', (e) => {
  const now = Date.now();
  if (now - lastTap < 400) {
    for (let i = 0; i < 10; i++) {
      const h = document.createElement('span');
      h.textContent = ['💚','🌿','✨','💗','⭐'][Math.floor(Math.random()*5)];
      h.style.cssText = `position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${1+Math.random()*1.5}rem;pointer-events:none;z-index:9999;animation:burstHeart 0.9s ease forwards;--dx:${(Math.random()-0.5)*120}px;--dy:${-(Math.random()*100+40)}px;`;
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 950);
    }
  }
  lastTap = now;
});
</script>
</body>
</html>
