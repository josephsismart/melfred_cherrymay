<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fred &amp; Chem — Forever Begins Here | Sept 5, 2026</title>
  <meta property="og:title" content="💍 Fred &amp; Chem — Forever Begins Here"/>
  <meta property="og:description" content="You're invited! Join us as Fred and Chem say 'I Do' on September 5, 2026 in Butuan City, Philippines. Click to open your digital invitation 💌"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://mc-wedding-2026.vercel.app/"/>
  <meta property="og:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height" content="630"/>
  <meta property="og:image:type" content="image/jpeg"/>
  <meta property="og:site_name" content="Fred &amp; Chem Wedding"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://mc-wedding-2026.vercel.app/og-image.jpg"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #4a7a5a; --rose-light: #6aaa7a; --blush: #c8e6d0;
      --gold: #d4a84b; --wine: #0d3322; --wine-mid: #1e5238;
    }
    html, body {
      min-height: 100%; overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: linear-gradient(160deg, #051a0a 0%, #0d3322 45%, #162e1f 75%, #051a0a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100dvh; position: relative;
      padding: 2rem 1rem;
    }

    /* Floating hearts canvas */
    #hearts-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* Corner florals */
    .corner-svg { position: fixed; pointer-events: none; opacity: 0.18; }
    .corner-svg.tl { top: 0; left: 0; }
    .corner-svg.br { bottom: 0; right: 0; transform: rotate(180deg); }

    /* Stars */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: twinkle var(--dur, 3s) var(--delay, 0s) infinite alternate;
    }
    @keyframes twinkle { 0%{opacity:0.1;transform:scale(0.8)} 100%{opacity:0.9;transform:scale(1.2)} }

    /* Main card */
    .home-card {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      gap: 0;
      animation: fadeIn 1.2s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ── BIG ENVELOPE ── */
    .env-btn {
      display: inline-flex; flex-direction: column; align-items: center; gap: 0.9rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      animation: fadeIn 1s 0.4s both;
    }
    .env-scene {
      position: relative;
      width: clamp(240px, 65vw, 320px);
      perspective: 900px;
    }
    /* Body */
    .env-body {
      width: 100%; aspect-ratio: 1.55/1;
      border-radius: 6px 6px 14px 14px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 4px 16px rgba(0,0,0,0.25);
      overflow: hidden;
      background: linear-gradient(150deg,#dff2e6,#c2e0cc);
    }
    /* Bottom V fold */
    .env-v {
      position: absolute; inset: 0;
      background: linear-gradient(160deg,#aacfb8,#8fc0a0);
      clip-path: polygon(0 100%, 50% 54%, 100% 100%);
      border-radius: 0 0 14px 14px;
    }
    /* Side triangles */
    .env-l { position:absolute;inset:0;background:linear-gradient(145deg,#c8e8d2,#aacfb8);clip-path:polygon(0 0,0 100%,50% 54%); }
    .env-r { position:absolute;inset:0;background:linear-gradient(145deg,#c0e2ca,#a2c8b0);clip-path:polygon(100% 0,100% 100%,50% 54%); }
    /* Letter */
    .env-letter {
      position:absolute; bottom:-5%; left:12%; right:12%;
      height:72%;
      background:linear-gradient(170deg,#fff,#f2fbf5);
      border-radius:4px;
      box-shadow:0 -6px 24px rgba(0,0,0,0.15);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
      padding:0 14px;
      opacity:0;
      transform:translateY(4px);
      transition:transform 0.55s 0.15s cubic-bezier(0.4,0,0.2,1), opacity 0.3s 0.2s;
      z-index:6;
      overflow:hidden;
    }
    .env-letter::before {
      content:'F & C';
      font-family:'Great Vibes',cursive; font-size:1.6rem;
      color:rgba(74,122,90,0.35); margin-bottom:4px;
    }
    .env-line { height:2px; width:100%; background:rgba(74,122,90,0.18); border-radius:2px; }
    .env-line:nth-child(3){ width:75%; }
    .env-line:nth-child(4){ width:88%; }
    .env-line:nth-child(5){ width:60%; }
    /* Wax seal — outside env-body so overflow:hidden doesn't clip it */
    .env-seal {
      position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
      width:48px; height:48px; border-radius:50%;
      background:radial-gradient(circle at 38% 35%,#4a7a5a,#0d3322);
      box-shadow:0 4px 16px rgba(0,0,0,0.4),0 0 0 3px rgba(200,230,208,0.2);
      display:flex; align-items:center; justify-content:center;
      z-index:20;
      transition: transform 0.4s, opacity 0.4s;
    }
    .env-seal svg { width:34px; height:34px; }
    /* Flap */
    .env-flap {
      position:absolute; top:0; left:0; right:0; height:54%;
      transform-origin:top center;
      transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
      z-index:15;
    }
    .env-flap-inner {
      position:absolute; inset:0;
      background:linear-gradient(160deg,#d0ecda,#b4d4c0);
      clip-path:polygon(0 0,100% 0,50% 88%);
      border-radius:6px 6px 0 0;
    }
    .env-flap-inner::after {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(160deg,rgba(255,255,255,0.25),transparent 60%);
      clip-path:polygon(0 0,100% 0,50% 88%);
    }

    /* Opened state */
    .env-btn.opened .env-flap { transform:rotateX(-175deg); z-index:4; }
    .env-btn.opened .env-letter { transform:translateY(-72%); opacity:1; }
    .env-btn.opened .env-seal { transform:translateX(-50%) scale(0.8); opacity:0; }

    /* Floating sparkles */
    .env-sparkle {
      position:absolute; font-size:1rem; pointer-events:none; opacity:0;
      animation: sparkleFloat 3s ease-in-out infinite;
    }
    @keyframes sparkleFloat {
      0%{opacity:0;transform:translateY(0) scale(0.5)}
      30%{opacity:0.8}
      100%{opacity:0;transform:translateY(-40px) scale(1.2)}
    }
    /* Label */
    .env-label {
      font-family:'Poppins',sans-serif; font-weight:500;
      font-size:clamp(0.68rem,2.2vw,0.82rem);
      letter-spacing:0.2em; text-transform:uppercase;
      color:rgba(200,230,208,0.7);
      transition:opacity 0.4s;
      margin-top:0.6rem;
    }
    .env-btn.opened .env-label { opacity:0; }
    /* Glow pulse */
    @keyframes envGlow {
      0%,100%{filter:drop-shadow(0 10px 28px rgba(74,122,90,0.35))}
      50%{filter:drop-shadow(0 16px 44px rgba(106,170,122,0.65))}
    }
    .env-scene { animation: envGlow 2.6s 2s infinite; }

    @keyframes burstHeart { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0} }

    /* Mobile */
    @media(max-width:600px) {
      .corner-svg { width: 140px; }
    }

    /* ── SNEAK PEEK OVERLAY ── */
    #sneak-peek {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #051a0a 0%, #0d3322 45%, #162e1f 75%, #051a0a 100%);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #sneak-peek.visible { opacity: 1; pointer-events: all; }

    .sneak-card {
      position: relative;
      background: linear-gradient(160deg, #0d2e1a, #162e1f);
      border: 1px solid rgba(200,230,208,0.15);
      border-radius: 20px;
      padding: 2rem 1.8rem 2.2rem;
      max-width: 340px; width: 90%;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(106,170,122,0.1);
      animation: sneakSlideIn 0.5s 0.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes sneakSlideIn {
      from { transform: translateY(30px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    .sneak-tag {
      font-family: 'Poppins', sans-serif;
      font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 1rem;
    }

    .sneak-photo {
      width: 140px; height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(200,230,208,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      margin: 0 auto 1.2rem;
      display: block;
      background: linear-gradient(135deg, #1e5238, #0d3322);
    }
    /* Placeholder if no photo yet */
    .sneak-photo-placeholder {
      width: 140px; height: 140px;
      border-radius: 50%;
      border: 3px solid rgba(200,230,208,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      margin: 0 auto 1.2rem;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1e5238, #0d3322);
      font-family: 'Great Vibes', cursive;
      font-size: 2.4rem;
      color: rgba(200,230,208,0.6);
    }

    .sneak-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 8vw, 2.6rem);
      color: #c8e6d0;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .sneak-ampersand { color: var(--gold); }

    .sneak-divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,75,0.6), transparent);
      margin: 0.8rem auto;
    }

    .sneak-date {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem; letter-spacing: 0.12em;
      color: rgba(200,230,208,0.75);
      margin-bottom: 0.3rem;
    }
    .sneak-location {
      font-family: 'Poppins', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.1em;
      color: rgba(200,230,208,0.45);
      margin-bottom: 1.5rem;
    }

    .sneak-letter-lines {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,230,208,0.1);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-bottom: 1.5rem;
    }
    .sneak-line {
      height: 2px; border-radius: 2px;
      background: rgba(200,230,208,0.15);
      margin: 5px 0;
    }
    .sneak-line:nth-child(2){ width: 75%; margin: 5px auto; }
    .sneak-line:nth-child(3){ width: 90%; margin: 5px auto; }
    .sneak-line:nth-child(4){ width: 60%; margin: 5px auto; }

    .sneak-cta {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: linear-gradient(135deg, #4a7a5a, #2a5a3a);
      color: #c8e6d0; border: none; border-radius: 50px;
      padding: 0.75rem 1.8rem;
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 24px rgba(74,122,90,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      justify-content: center;
    }
    .sneak-cta:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(74,122,90,0.3); }
  </style>
</head>
<body>
<canvas id="hearts-canvas"></canvas>

<!-- Corner florals -->
<svg class="corner-svg tl" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="30" cy="30" r="28" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="80" cy="15" r="18" fill="#4a7a5a" opacity="0.4"/>
  <circle cx="15" cy="80" r="18" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="30" cy="30" rx="12" ry="20" fill="#c8e6d0" opacity="0.6" transform="rotate(-30 30 30)"/>
  <ellipse cx="80" cy="15" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(20 80 15)"/>
  <ellipse cx="15" cy="80" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(-60 15 80)"/>
  <circle cx="50" cy="50" r="3" fill="#6aaa7a" opacity="0.6"/>
  <circle cx="90" cy="30" r="2" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="30" cy="90" r="2" fill="#6aaa7a" opacity="0.5"/>
</svg>
<svg class="corner-svg br" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <circle cx="30" cy="30" r="28" fill="#6aaa7a" opacity="0.5"/>
  <circle cx="80" cy="15" r="18" fill="#4a7a5a" opacity="0.4"/>
  <circle cx="15" cy="80" r="18" fill="#4a7a5a" opacity="0.4"/>
  <ellipse cx="30" cy="30" rx="12" ry="20" fill="#c8e6d0" opacity="0.6" transform="rotate(-30 30 30)"/>
  <ellipse cx="80" cy="15" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(20 80 15)"/>
  <ellipse cx="15" cy="80" rx="8" ry="14" fill="#c8e6d0" opacity="0.5" transform="rotate(-60 15 80)"/>
</svg>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Main content — envelope only -->
<div class="home-card">
  <div class="env-btn" id="envBtn">
    <div class="env-scene">
      <span class="env-sparkle" style="left:8%;top:30%;animation-delay:0s">✨</span>
      <span class="env-sparkle" style="right:10%;top:20%;animation-delay:1s">💚</span>
      <span class="env-sparkle" style="left:20%;top:10%;animation-delay:2s">🌿</span>
      <div class="env-body">
        <div class="env-l"></div>
        <div class="env-r"></div>
        <div class="env-v"></div>
        <div class="env-letter">
          <div class="env-line"></div>
          <div class="env-line"></div>
          <div class="env-line"></div>
          <div class="env-line"></div>
        </div>
        <div class="env-flap"><div class="env-flap-inner"></div></div>
      </div>
      <!-- Seal outside env-body so overflow:hidden doesn't clip it -->
      <div class="env-seal">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(200,230,208,0.25)" stroke-width="1.5"/>
          <text x="50" y="58" text-anchor="middle" font-family="Great Vibes,Georgia,serif" font-size="34" font-style="italic" fill="rgba(255,255,255,0.9)">FC</text>
        </svg>
      </div>
    </div>
    <span class="env-label">✉ Tap to Open Invitation</span>
  </div>
</div>

<!-- Sneak Peek Overlay -->
<div id="sneak-peek">
  <div class="sneak-card">
    <p class="sneak-tag">✦ Wedding Invitation ✦</p>
    <div class="sneak-photo-placeholder">F&C</div>
    <div class="sneak-names">Fred <span class="sneak-ampersand">&</span> Chem</div>
    <div class="sneak-divider"></div>
    <div class="sneak-date">September 5, 2026</div>
    <div class="sneak-location">Butuan City, Philippines</div>
    <div class="sneak-letter-lines">
      <div class="sneak-line"></div>
      <div class="sneak-line"></div>
      <div class="sneak-line"></div>
      <div class="sneak-line"></div>
    </div>
    <button class="sneak-cta" onclick="window.location.href='/invitation.html'">
      Tap to View Details &nbsp;→
    </button>
  </div>
</div>

<script>
const envBtn = document.getElementById('envBtn');
const sneakPeek = document.getElementById('sneak-peek');
let envClicked = false;
envBtn.addEventListener('click', function() {
  if(envClicked) return;
  envClicked = true;
  this.classList.add('opened');
  setTimeout(() => { sneakPeek.classList.add('visible'); }, 700);
});

// ── STARS ──
const starsEl = document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star';
  const size=(Math.random()*2+0.8).toFixed(1);
  s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${(Math.random()*3+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s;`;
  starsEl.appendChild(s);
}

// ── FLOATING HEARTS ──
const hc=document.getElementById('hearts-canvas');
const hx=hc.getContext('2d');
let W,H;
function resize(){W=hc.width=window.innerWidth;H=hc.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const COLORS=['#c8e6d0','#6aaa7a','#4a7a5a','#aad8b8','#d0eedd'];
class Heart{
  constructor(init){this.x=Math.random()*W;this.y=init?Math.random()*H:H+20;this.size=Math.random()*10+4;this.speed=Math.random()*0.5+0.15;this.opacity=Math.random()*0.25+0.04;this.wobble=Math.random()*Math.PI*2;this.wobbleSpeed=Math.random()*0.02+0.005;this.color=COLORS[Math.floor(Math.random()*COLORS.length)];}
  update(){this.y-=this.speed;this.wobble+=this.wobbleSpeed;this.x+=Math.sin(this.wobble)*0.5;if(this.y<-20){this.y=H+20;this.x=Math.random()*W;}}
  draw(){hx.save();hx.globalAlpha=this.opacity;hx.fillStyle=this.color;hx.translate(this.x,this.y);const s=this.size/10;hx.beginPath();hx.moveTo(0,-2*s);hx.bezierCurveTo(5*s,-7*s,10*s,0,0,8*s);hx.bezierCurveTo(-10*s,0,-5*s,-7*s,0,-2*s);hx.fill();hx.restore();}
}
const hearts=Array.from({length:35},(_,i)=>new Heart(true));
function animateHearts(){hx.clearRect(0,0,W,H);hearts.forEach(h=>{h.update();h.draw();});requestAnimationFrame(animateHearts);}
animateHearts();

// ── DOUBLE TAP BURST ──
let lastTap=0;
document.addEventListener('click',(e)=>{
  const now=Date.now();
  if(now-lastTap<400){for(let i=0;i<12;i++){const h=document.createElement('span');h.textContent=['💚','🌿','✨','💗','🌸'][Math.floor(Math.random()*5)];h.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;font-size:${1+Math.random()*1.5}rem;pointer-events:none;z-index:9999;animation:burstHeart 0.9s ease forwards;--dx:${(Math.random()-0.5)*120}px;--dy:${-(Math.random()*100+40)}px;`;document.body.appendChild(h);setTimeout(()=>h.remove(),950);}}
  lastTap=now;
});
</script>
</body>
</html>
